name: Client CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Smoke test bin launch (npx regression guard)
        run: |
          # mcp-stdio: must exit 1 with "Failed to resolve Lighthouse URL" when no URL configured
          LIGHTHOUSE_STANDALONE_LOCKFILE_PATH=/tmp/smoke-missing.lock.json \
            node packages/mcp-stdio/dist/bin.js 2>&1 | grep -q "Failed to resolve Lighthouse URL" \
            && echo "mcp-stdio smoke: PASS" \
            || (echo "mcp-stdio smoke: FAIL - unexpected output"; exit 1)

          # mcp-http: must exit 1 with "Missing LIGHTHOUSE_URL" when env var absent
          node packages/mcp-http/dist/bin.js 2>&1 | grep -q "Missing LIGHTHOUSE_URL" \
            && echo "mcp-http smoke: PASS" \
            || (echo "mcp-http smoke: FAIL - unexpected output"; exit 1)

  release:
    runs-on: ubuntu-latest
    needs:
      - verify
    if: github.ref == 'refs/heads/main'
    environment: Release

    outputs:
      cli_version: ${{ steps.get_versions.outputs.cli_version }}

    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Update npm to latest version for OIDC support
        run: npm install -g npm@latest

      - name: Extract Versions
        id: get_versions
        run: |
          CLI_VER=$(jq -r .version packages/cli/package.json)
          MCP_VER=$(jq -r .version packages/mcp-http/package.json)
          MCP_STDIO_VER=$(jq -r .version packages/mcp-stdio/package.json)
          echo "CLI_VERSION=$CLI_VER" >> $GITHUB_ENV
          echo "MCP_VERSION=$MCP_VER" >> $GITHUB_ENV
          echo "MCP_STDIO_VERSION=$MCP_STDIO_VER" >> $GITHUB_ENV
          echo "cli_version=$CLI_VER" >> $GITHUB_OUTPUT

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Publish npm packages
        run: pnpm release:publish --tag latest
        env:
          NPM_CONFIG_PROVENANCE: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Build CLI release binaries
        run: |
          mkdir -p release-assets
          bun build ./packages/cli/src/bin.ts --compile --target bun-linux-x64-modern --outfile ./release-assets/lh
          tar -czf ./release-assets/lh-linux-x64.tar.gz -C ./release-assets lh
          bun build ./packages/cli/src/bin.ts --compile --target bun-darwin-x64-modern --outfile ./release-assets/lh
          tar -czf ./release-assets/lh-darwin-x64.tar.gz -C ./release-assets lh
          bun build ./packages/cli/src/bin.ts --compile --target bun-windows-x64-modern --outfile ./release-assets/lh.exe
          cd release-assets && zip -q lh-windows-x64.zip lh.exe

      - name: Build and pack mcp-stdio MCPB bundle
        run: |
          mkdir -p mcpb-staging/server
          jq --arg v "$MCP_STDIO_VERSION" '.version = $v' \
            packages/mcp-stdio/mcpb/manifest.json > mcpb-staging/manifest.json
          cp packages/mcp-stdio/mcpb/launcher.cjs mcpb-staging/server/launcher.cjs
          npx -y @anthropic-ai/mcpb validate mcpb-staging/manifest.json
          npx -y @anthropic-ai/mcpb pack mcpb-staging/ release-assets/lighthouse-mcp-stdio.mcpb

      - name: Copy install/uninstall scripts to release assets
        run: |
          cp scripts/install.sh release-assets/install.sh
          cp scripts/uninstall.sh release-assets/uninstall.sh
          cp scripts/install.ps1 release-assets/install.ps1
          cp scripts/uninstall.ps1 release-assets/uninstall.ps1

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.CLI_VERSION }}
          name: Lighthouse Clients ${{ env.CLI_VERSION }}
          prerelease: false
          files: |
            release-assets/lh-linux-x64.tar.gz
            release-assets/lh-darwin-x64.tar.gz
            release-assets/lh-windows-x64.zip
            release-assets/install.sh
            release-assets/uninstall.sh
            release-assets/install.ps1
            release-assets/uninstall.ps1
            release-assets/lighthouse-mcp-stdio.mcpb

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push mcp-http container
        uses: docker/build-push-action@v6
        with:
          context: ./packages/mcp-http
          file: ./packages/mcp-http/Dockerfile
          push: true
          tags: |
            ghcr.io/letpeoplework/lighthouse-clients/mcp-http:${{ env.MCP_VERSION }}
            ghcr.io/letpeoplework/lighthouse-clients/mcp-http:latest
  
  
  # ---------------------------------------------------------------------------
  # Post-release smoke tests
  # ---------------------------------------------------------------------------

  smoke-linux:
    runs-on: ubuntu-latest
    needs: release
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install CLI via npm
        run: npm install -g @letpeoplework/lighthouse-cli@${{ needs.release.outputs.cli_version }}

      - name: Start Lighthouse (SQLite mode)
        run: |
          docker run -d --name lighthouse-smoke \
            -p 8443:443 \
            -e Database__Provider=sqlite \
            -e "Database__ConnectionString=Data Source=lighthouse.db" \
            ghcr.io/letpeoplework/lighthouse:latest

      - name: Wait for Lighthouse to become ready
        run: |
          echo "Waiting for Lighthouse health endpoint..."
          timeout 90 bash -c \
            'until curl --silent --fail --insecure https://127.0.0.1:8443/api/v1/version/current; do sleep 2; done'
          echo ""
          echo "Lighthouse is ready."

      - name: Seed demo scenario 2
        run: |
          curl --fail --insecure -X POST \
            https://127.0.0.1:8443/api/v1/demo/scenarios/2/load
          echo "Demo data seeded."

      - name: Wait for demo data to be processed
        run: |
          echo "Waiting for teams to appear in API..."
          timeout 60 bash -c \
            'until lh team list --json 2>/dev/null | grep -q "Team Zenith"; do sleep 2; done'
          echo "Teams are ready."

      - name: Connect CLI to Lighthouse
        run: |
          lh connection connect \
            --mode server \
            --url https://127.0.0.1:8443 \
            --insecure

      - name: Verify teams (Team Zenith and Team Voyager)
        run: |
          TEAMS=$(lh team list --json)
          echo "$TEAMS"
          echo "$TEAMS" | grep -q "Team Zenith" \
            || (echo "FAIL: Team Zenith not found in team list"; exit 1)
          echo "$TEAMS" | grep -q "Team Voyager" \
            || (echo "FAIL: Team Voyager not found in team list"; exit 1)
          echo "Teams assertion: PASS"

      - name: Verify portfolios (Project Orion)
        run: |
          PORTFOLIOS=$(lh portfolio list --json)
          echo "$PORTFOLIOS"
          echo "$PORTFOLIOS" | grep -q "Project Orion" \
            || (echo "FAIL: Project Orion not found in portfolio list"; exit 1)
          echo "Portfolio assertion: PASS"

      - name: Show Lighthouse container logs on failure
        if: failure()
        run: docker logs lighthouse-smoke || true

      - name: Cleanup
        if: always()
        run: |
          docker stop lighthouse-smoke || true
          docker rm lighthouse-smoke || true

  smoke-windows:
    runs-on: windows-latest
    needs: release
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node (for smoke fixture and npm install)
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Start smoke fixture
        id: start_fixture
        shell: bash
        run: |
          node scripts/smoke-fixture.mjs &
          for i in $(seq 1 20); do
            [ -f .fixture-port ] && break
            sleep 0.5
          done
          if [ ! -f .fixture-port ]; then
            echo "ERROR: Fixture server did not start within 10 s"
            exit 1
          fi
          FIXTURE_PORT=$(cat .fixture-port)
          echo "fixture_port=$FIXTURE_PORT" >> "$GITHUB_OUTPUT"
          echo "Fixture ready on port $FIXTURE_PORT"

      - name: Install CLI via npm
        run: npm install -g @letpeoplework/lighthouse-cli@${{ needs.release.outputs.cli_version }}

      - name: Connect CLI to fixture
        shell: bash
        run: |
          lh connection connect \
            --mode server \
            --url http://127.0.0.1:${{ steps.start_fixture.outputs.fixture_port }}

      - name: Verify team list
        shell: bash
        run: |
          TEAMS=$(lh team list --json)
          echo "$TEAMS"
          echo "$TEAMS" | grep -q "FixtureTeam" \
            || (echo "FAIL: FixtureTeam not found in team list"; exit 1)
          echo "Team list assertion: PASS"

  smoke-macos:
    runs-on: macos-latest
    needs: release
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node (for smoke fixture and npm install)
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Start smoke fixture
        id: start_fixture
        run: |
          node scripts/smoke-fixture.mjs &
          for i in $(seq 1 20); do
            [ -f .fixture-port ] && break
            sleep 0.5
          done
          if [ ! -f .fixture-port ]; then
            echo "ERROR: Fixture server did not start within 10 s"
            exit 1
          fi
          FIXTURE_PORT=$(cat .fixture-port)
          echo "fixture_port=$FIXTURE_PORT" >> "$GITHUB_OUTPUT"
          echo "Fixture ready on port $FIXTURE_PORT"

      - name: Install CLI via npm
        run: npm install -g @letpeoplework/lighthouse-cli@${{ needs.release.outputs.cli_version }}

      - name: Connect CLI to fixture
        run: |
          lh connection connect \
            --mode server \
            --url http://127.0.0.1:${{ steps.start_fixture.outputs.fixture_port }}

      - name: Verify team list
        run: |
          TEAMS=$(lh team list --json)
          echo "$TEAMS"
          echo "$TEAMS" | grep -q "FixtureTeam" \
            || (echo "FAIL: FixtureTeam not found in team list"; exit 1)
          echo "Team list assertion: PASS"